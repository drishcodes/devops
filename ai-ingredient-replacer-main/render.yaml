services:
  - type: web
    name: foodfit-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
  - type: web
    name: foodfit-frontend
    env: static
    plan: free
    buildCommand: CI=false npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://foodfit-backend.onrender.com
